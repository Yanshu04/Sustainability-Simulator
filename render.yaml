services:
  - type: web
    name: sustainability-simulator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sustainability-simulator-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app

databases:
  - name: sustainability-simulator-db
    plan: free
    databaseName: sustainability_simulator
    user: sustainability_user
